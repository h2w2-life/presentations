            ### programming languages
            ---
            #### Java
            ```
public class Main {
    public static void main(String[] args) {

        int a = 10;
        int b = 20;
        int c = 30;

        float determinant = b * b - 4 * a * c;

        System.out.println("Determinant = " + determinant);
    }
}
            ```
            ---
            #### Clojure
            ```
(let [a 10
      b 20
      c 30
      determinant (- (* b b) (* 4 a c))]
   (println "Determinant = " determinant))
            ```
            ---
