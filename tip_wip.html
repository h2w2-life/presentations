            ```

            else:

            - input number → check >10
            ```
            num = int(input("enter a number: "))
            if num > 10:
                print("entered number is greater than 10")
            ```
            - modify even/odd → also print “zero” separately
            ```
            num = int(input("enter a number: "))
            if num % 2 == 0:
                print("entered number is even")
            else:
                print("entered number is odd")
            if num == 0:
                print("entered number is zero")
            ```
            ---

            num1 = int(input("enter marks of 1st subject: "))

            num1 = int(input("enter 1st number: "))

            if num1 > num2 and num1 > num3:

            ---
            ## Day - 5
            - concepts
              1. why multiple ifs are not enough
              2. if - elif - else
              3. order matters
              4. full structure (if-elif-else)
              5. boundary awareness
            ---
            ### concept - 1
            - why multiple `if`s are not enough
            ```
x = 10
if x > 5:
    print("A")
if x > 8:
    print("B")
            ```
            - but what if we need just 1 output? <!-- .element: class="fragment" -->
            ---
            - real world problem
            ```
marks = 80
if marks >= 75:
    print("distinction")
if marks >= 50:
    print("pass")
            ```
            - ie, both conditions run <!-- .element: class="fragment" -->
            ---
            ### concept - 2
            - `elif` (ie, `else if`)
            ```
marks = 80
if marks >= 75:
    print("distinction")
elif marks >= 50:
    print("pass")
            ```
            - rule: only ONE block runs. after first true condition, rest are skipped <!-- .element: class="fragment" -->
            - marks = 60 <!-- .element: class="fragment" -->
            ---
            ### concept - 3
            - order matters
            ```
marks = 80
if marks >= 50:
    print("pass")
elif marks >= 75:
    print("distinction")
            ```
            ```
marks = 80
if marks >= 75:
    print("distinction")
elif marks >= 50:
    print("pass")
            ```
            ---
            ### concept - 4
            - full structure (if - elif - else)
            ```
input: marks
task:
    >= 75 → distinction
    >= 50 → pass
    else → fail
            ```
            ```
