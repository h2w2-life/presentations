            #### Java
            ```
public class Main {
    public static void main(String[] args) {

        int a = 10;
        int b = 20;
        int c = 30;

        float determinant = b * b - 4 * a * c;

        System.out.println("Determinant = " + determinant);
    }
}
            ```

            ```
(let [a 10

            ### data types

            ### type conversion

            ---
            ### operators
            ---
            #### arithmetic (+, -, *, /)
            ```
a = 7
b = 2

# addition
print ('Sum: ', a + b)

# subtraction
print ('Subtraction: ', a - b)

# multiplication
print ('Multiplication: ', a * b)

# division
print ('Division: ', a / b)
            ```
            ---
            #### extra arithmetic (//, %, **)
            ```
a = 7
b = 2

# floor division
print ('Floor Division: ', a // b)

# modulo
print ('Modulo: ', a % b)

# a to the power b
print ('Power: ', a ** b)
            ```
            ---
            #### comparison (<, >, <=, >=, ==, !=)
            ```
a = 5
b = 2

# equal to operator
print('a == b =', a == b)

# not equal to operator
print('a != b =', a != b)

# greater than operator
print('a > b =', a > b)

# less than operator
print('a < b =', a < b)

# greater than or equal to operator
print('a >= b =', a >= b)

# less than or equal to operator
print('a <= b =', a <= b)
            ```
            ---
            #### assignment (=, +=, -+, *=, /=, %=, **=)
            ```
# assign 10 to a
a = 10

# assign 5 to b
b = 5

# assign the sum of a and b to a
a += b      # a = a + b

print(a)

# Output: 15
            ```

            ## Day - 3
            - more data types
              - boolean (True, False)
              - nothing (None)

            ---
            ### more data types
            - boolean (True, False)
            - nothing (None)
            ---
            ### more operators
            logical (and, or)
            ```
# logical AND
# (True only if all operands are True, else False)
print(True and True)
print(True and False)

# logical OR
# (False only if all operands are False, else True)
print(True or False)

# logical NOT
# (True -> False, and False -> True)
print(not True)
            ```
            ---
            ### more operators ...
            ```
a = 5
b = 6

print((a > 2) and (b >= 6))
            ```
            ---
            ### syntactic errors
            - not following rules of programming language correctly
            - indentation (most common)
            ```
print("a")
  print("b")
print("c")
            ```
            - missing or extra brackets
            ```
print("a")
print("b"))
print("c")
            ```
            - misspelling Python keywords
            ```
a = true
b = none
            ```
            ---
            ### logical errors
            - caused due to mistake in logic
            - name error (using a variable that hasn't been defined yet)
            ```
a = b
            ```
            - value error (wrong input) / type error (wrong parameter)
            ```
a = int("forty")
print("forty" / 4)
            ```
            - arithmetic error
            ```
a = 20 / 0
            ```
