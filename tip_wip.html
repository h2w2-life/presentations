            #### Java
            ```
public class Main {
    public static void main(String[] args) {

        int a = 10;
        int b = 20;
        int c = 30;

            ---
            ### operators
            ---
            #### arithmetic (+, -, *, /)
            ```
a = 7
b = 2

# addition
print ('Sum: ', a + b)

# subtraction
print ('Subtraction: ', a - b)

# multiplication
print ('Multiplication: ', a * b)

# division
print ('Division: ', a / b)
            ```
            ---
            #### extra arithmetic (//, %, **)
            ```
a = 7
b = 2

# floor division
print ('Floor Division: ', a // b)

# modulo
print ('Modulo: ', a % b)

# a to the power b
print ('Power: ', a ** b)
            ```
            ---
            #### comparison (<, >, <=, >=, ==, !=)
            ```
a = 5
b = 2

# equal to operator
print('a == b =', a == b)

# not equal to operator
print('a != b =', a != b)

# greater than operator
print('a > b =', a > b)

# less than operator
print('a < b =', a < b)

# greater than or equal to operator
print('a >= b =', a >= b)

# less than or equal to operator
print('a <= b =', a <= b)
            ```
            ---
            #### logical (and, or)
            ```
a = 5
b = 6

print((a > 2) and (b >= 6))    # True

# logical AND
print(True and True)     # True
print(True and False)    # False

# logical OR
print(True or False)     # True

# logical NOT
print(not True)          # False
            ```
            ---
            #### assignment (=, +=, -+, *=, /=, %=, **=)
            ```
# assign 10 to a
a = 10

# assign 5 to b
b = 5

# assign the sum of a and b to a
a += b      # a = a + b

print(a)

# Output: 15
            ```
